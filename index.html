<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Qualiopi — EPITECH</title>
<style>
:root {
  --green: #22c55e; --green-bg: #f0fdf4; --green-border: #bbf7d0;
  --orange: #f59e0b; --orange-bg: #fffbeb; --orange-border: #fde68a;
  --red: #ef4444; --red-bg: #fef2f2; --red-border: #fecaca;
  --blue: #3b82f6; --blue-bg: #eff6ff; --blue-border: #bfdbfe;
  --purple: #8b5cf6; --purple-bg: #f5f3ff; --purple-border: #ddd6fe;
  --gray: #6b7280; --gray-bg: #f9fafb; --gray-border: #e5e7eb;
  --dark: #1f2937; --light: #f3f4f6; --white: #ffffff;
  --sidebar-w: 300px;
  --font: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--light); color: var(--dark); display: flex; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w); background: var(--white); border-right: 1px solid var(--gray-border);
  display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 10;
}
.sidebar-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-border); background: var(--dark); color: white; }
.sidebar-header h1 { font-size: 16px; font-weight: 700; }
.sidebar-header .subtitle { font-size: 11px; color: #9ca3af; margin-top: 3px; }

/* CAMPUS SELECTOR */
.campus-selector { padding: 12px 16px; border-bottom: 1px solid var(--gray-border); background: var(--purple-bg); }
.campus-selector .cs-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--purple); margin-bottom: 6px; }
.campus-tabs { display: flex; flex-direction: column; gap: 4px; }
.campus-tab {
  padding: 8px 12px; border-radius: 8px; cursor: pointer; border: 1px solid var(--gray-border);
  background: white; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center;
}
.campus-tab:hover { border-color: var(--purple); }
.campus-tab.active { background: var(--purple); color: white; border-color: var(--purple); }
.campus-tab .ct-name { font-size: 13px; font-weight: 600; }
.campus-tab .ct-meta { font-size: 10px; opacity: 0.8; }
.campus-tab .ct-pct { font-size: 14px; font-weight: 800; }
.campus-tab.active .ct-meta { color: rgba(255,255,255,0.8); }

/* OVERVIEW TAB */
.campus-tab.overview { border-color: var(--blue-border); background: var(--blue-bg); }
.campus-tab.overview.active { background: var(--blue); color: white; border-color: var(--blue); }

.global-progress { padding: 12px 16px; border-bottom: 1px solid var(--gray-border); }
.global-progress .label { font-size: 12px; font-weight: 600; color: var(--dark); margin-bottom: 4px; }
.global-progress .pct { font-size: 24px; font-weight: 800; color: var(--blue); }
.progress-bar { height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; margin-top: 4px; }
.progress-bar .fill { height: 100%; border-radius: 3px; transition: width 0.5s ease, background 0.3s; }

.search-box { padding: 8px 16px; border-bottom: 1px solid var(--gray-border); }
.search-box input { width: 100%; padding: 7px 10px; border: 1px solid var(--gray-border); border-radius: 6px; font-size: 12px; }
.search-box input:focus { outline: none; border-color: var(--blue); }

.critere-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.critere-item { padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.2s; }
.critere-item:hover { background: var(--light); }
.critere-item.active { background: var(--blue-bg); border-left-color: var(--blue); }
.critere-item .critere-label { font-size: 12px; font-weight: 600; color: var(--dark); }
.critere-item .critere-title { font-size: 10px; color: var(--gray); margin-top: 1px; }
.critere-item .critere-progress { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
.critere-item .critere-progress .bar { flex: 1; height: 5px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
.critere-item .critere-progress .bar .fill { height: 100%; border-radius: 3px; }
.critere-item .critere-progress .pct { font-size: 11px; font-weight: 700; min-width: 32px; text-align: right; }

.sidebar-footer { padding: 10px 16px; border-top: 1px solid var(--gray-border); font-size: 10px; color: var(--gray); }
.sidebar-footer button { background: var(--dark); color: white; border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; width: 100%; margin-top: 4px; }
.sidebar-footer button:hover { opacity: 0.9; }

/* MAIN */
.main { margin-left: var(--sidebar-w); flex: 1; padding: 20px 28px; max-width: 1100px; }
.main-header { margin-bottom: 20px; }
.main-header h2 { font-size: 20px; font-weight: 700; }
.main-header p { font-size: 13px; color: var(--gray); margin-top: 3px; }

/* CAMPUS BADGE in main header */
.campus-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--purple); color: white; padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; margin-bottom: 8px; }
.campus-badge.overview-badge { background: var(--blue); }
.campus-badge .cb-days { background: rgba(255,255,255,0.25); padding: 1px 6px; border-radius: 3px; font-size: 10px; }
.campus-badge .cb-scope { font-size: 10px; font-weight: 400; opacity: 0.9; }

.stats-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.stat-card { background: var(--white); border-radius: 8px; padding: 12px 16px; flex: 1; min-width: 120px; border: 1px solid var(--gray-border); }
.stat-card .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray); font-weight: 600; }
.stat-card .stat-value { font-size: 20px; font-weight: 800; margin-top: 2px; }
.stat-card.green .stat-value { color: var(--green); }
.stat-card.orange .stat-value { color: var(--orange); }
.stat-card.red .stat-value { color: var(--red); }
.stat-card.blue .stat-value { color: var(--blue); }
.stat-card.purple .stat-value { color: var(--purple); }

/* OVERVIEW MODE */
.overview-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.overview-campus-card { background: white; border-radius: 10px; border: 1px solid var(--gray-border); padding: 20px; }
.overview-campus-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.overview-campus-card .oc-meta { font-size: 12px; color: var(--gray); margin-bottom: 12px; }
.overview-campus-card .oc-pct { font-size: 32px; font-weight: 800; }
.overview-campus-card .oc-bar { margin-top: 8px; }
.overview-criteres { margin-top: 12px; }
.overview-critere-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }
.overview-critere-row .ocr-label { flex: 1; }
.overview-critere-row .ocr-bar { width: 80px; height: 5px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
.overview-critere-row .ocr-bar .fill { height: 100%; border-radius: 3px; }
.overview-critere-row .ocr-pct { width: 36px; text-align: right; font-weight: 700; font-size: 11px; }

/* MATRIX VIEW */
.matrix-table { width: 100%; border-collapse: collapse; font-size: 12px; background: white; border-radius: 8px; overflow: hidden; border: 1px solid var(--gray-border); }
.matrix-table th { background: var(--dark); color: white; padding: 8px 12px; text-align: left; font-weight: 600; position: sticky; top: 0; }
.matrix-table td { padding: 6px 12px; border-bottom: 1px solid var(--gray-border); }
.matrix-table tr:hover td { background: var(--gray-bg); }
.matrix-table .cell-bar { width: 50px; height: 5px; background: #e5e7eb; border-radius: 3px; overflow: hidden; display: inline-block; vertical-align: middle; margin-right: 4px; }
.matrix-table .cell-bar .fill { height: 100%; border-radius: 3px; }
.matrix-nat { font-size: 10px; color: var(--purple); font-weight: 600; }

/* INDICATEUR CARD */
.indicateur-card {
  background: var(--white); border-radius: 8px; border: 1px solid var(--gray-border);
  margin-bottom: 10px; overflow: hidden; transition: box-shadow 0.2s;
}
.indicateur-card:hover { box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
.indicateur-header {
  padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; user-select: none;
}
.indicateur-header .num { background: var(--dark); color: white; width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.indicateur-header .info { flex: 1; min-width: 0; }
.indicateur-header .info .title { font-size: 13px; font-weight: 600; }
.indicateur-header .info .desc { font-size: 11px; color: var(--gray); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.indicateur-header .completion { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.indicateur-header .completion .pct { font-size: 14px; font-weight: 800; }
.indicateur-header .completion .mini-bar { width: 50px; height: 5px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
.indicateur-header .completion .mini-bar .fill { height: 100%; border-radius: 3px; }
.indicateur-header .chevron { font-size: 16px; color: var(--gray); transition: transform 0.2s; flex-shrink: 0; }
.indicateur-card.open .indicateur-header .chevron { transform: rotate(90deg); }
.indicateur-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--gray-border); }
.indicateur-card.open .indicateur-body { display: block; padding-top: 12px; }
.indicateur-body .full-desc { font-size: 12px; color: var(--dark); line-height: 1.5; margin-bottom: 12px; padding: 10px; background: var(--gray-bg); border-radius: 6px; }
.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray); margin: 12px 0 6px; }

/* PREUVES */
.preuve-item {
  display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; border-radius: 6px;
  border: 1px solid var(--gray-border); margin-bottom: 5px; transition: background 0.2s; font-size: 12px;
}
.preuve-item:hover { background: var(--gray-bg); }
.preuve-item input[type="checkbox"] { margin-top: 1px; width: 15px; height: 15px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }
.preuve-item .preuve-info { flex: 1; min-width: 0; }
.preuve-item .preuve-label { font-size: 12px; font-weight: 500; }
.preuve-item .preuve-meta { font-size: 10px; color: var(--gray); margin-top: 1px; }
.preuve-item.checked { background: var(--green-bg); border-color: var(--green-border); }
.preuve-item.partial { background: var(--orange-bg); border-color: var(--orange-border); }
.preuve-item.na-item { background: var(--gray-bg); border-color: var(--gray-border); opacity: 0.6; }
.preuve-item .preuve-actions select {
  font-size: 10px; padding: 2px 3px; border: 1px solid var(--gray-border); border-radius: 3px; background: white;
}
.preuve-note { width: 100%; margin-top: 4px; padding: 4px 6px; border: 1px solid var(--gray-border); border-radius: 3px; font-size: 11px; font-family: var(--font); resize: vertical; min-height: 24px; }
.preuve-note:focus { outline: none; border-color: var(--blue); }

/* NATIONAL BADGE on proofs */
.niveau-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 700; }
.niveau-badge.national { background: var(--purple-bg); color: var(--purple); border: 1px solid var(--purple-border); }
.niveau-badge.campus { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }

/* OBLIGATIONS */
.obligations-box { background: var(--orange-bg); border: 1px solid var(--orange-border); border-radius: 6px; padding: 10px; margin-top: 8px; }
.obligations-box .ob-title { font-size: 11px; font-weight: 700; color: var(--orange); margin-bottom: 4px; }
.obligations-box .ob-item { font-size: 11px; color: var(--dark); margin-bottom: 3px; line-height: 1.4; }
.obligations-box .ob-label { font-weight: 600; }

/* ACTIONS */
.action-item { display: flex; align-items: flex-start; gap: 6px; padding: 6px 10px; background: var(--blue-bg); border: 1px solid var(--blue-border); border-radius: 6px; margin-bottom: 4px; font-size: 11px; }
.action-item .action-status { padding: 1px 5px; border-radius: 3px; font-size: 9px; font-weight: 700; text-transform: uppercase; flex-shrink: 0; }
.action-item .action-status.termine { background: var(--green); color: white; }
.action-item .action-status.en_cours { background: var(--orange); color: white; }
.action-item .action-status.non_commence { background: var(--red); color: white; }
.action-item .action-resp { color: var(--gray); font-size: 10px; }

.tags { display: flex; gap: 3px; margin-top: 2px; flex-wrap: wrap; }
.tag { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
.tag.of { background: #dbeafe; color: #1e40af; }
.tag.cfa { background: #fce7f3; color: #9d174d; }
.tag.vae { background: #f3e8ff; color: #6b21a8; }
.tag.cbc { background: #ecfdf5; color: #065f46; }

/* FILTER TABS */
.filter-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-tab { padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--gray-border); background: white; transition: all 0.2s; }
.filter-tab:hover { background: var(--light); }
.filter-tab.active { background: var(--dark); color: white; border-color: var(--dark); }

/* NOT-AUDITED INFO */
.not-audited-info { background: var(--purple-bg); border: 1px solid var(--purple-border); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 12px; color: var(--purple); }
.not-audited-info strong { font-weight: 700; }

@media print { .sidebar { display: none; } .main { margin-left: 0; } }
</style>
</head>

<div class="sidebar">

  <div class="campus-selector">

    <button onclick="exportData()">Exporter JSON</button>

    <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">

</div>

<div class="main" id="main-content"></div>

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (saved && Object.keys(saved).length > 1) return saved;
    // First load or reset: use defaults
    const defaults = buildDefaultState();
    defaults._lastModified = new Date().toISOString();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(defaults));
    return defaults;
  } catch(e) {
    const defaults = buildDefaultState();
    defaults._lastModified = new Date().toISOString();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(defaults));
    return defaults;
  }
}
function saveState(s) { s._lastModified = new Date().toISOString(); localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); updateLastModified(s._lastModified); }
let state = loadState();

function getKey(campusId, preuveId) { return campusId + ':' + preuveId; }

function getPreuveState(campusId, preuveId) {
  return state[getKey(campusId, preuveId)] || { statut: 'non_evalue', note: '' };
}

function setPreuveState(campusId, preuveId, data) {
  const key = getKey(campusId, preuveId);
  state[key] = { ...getPreuveState(campusId, preuveId), ...data };
  saveState(state);
}

// ===== WHICH PROOFS ARE VISIBLE PER CAMPUS =====
function getVisiblePreuves(indicateur, campusId) {
  if (campusId === 'overview') return indicateur.preuves;
  const campus = CAMPUS.find(c => c.id === campusId);
  if (campus.scope === 'national+campus') return indicateur.preuves; // Paris sees all
  // Regional: only campus-level proofs
  return indicateur.preuves.filter(p => p.niveau === 'campus');
}

function getNationalPreuvesCount(indicateur) {
  return indicateur.preuves.filter(p => p.niveau === 'national').length;
}

// ===== COMPLETION CALC =====
function calcIndicateurCompletion(indicateur, campusId) {
  const preuves = getVisiblePreuves(indicateur, campusId);
  if (preuves.length === 0) return 100;
  let done = 0;
  preuves.forEach(p => {
    const cid = (campusId === 'overview') ? 'paris' : campusId;
    // For national proofs in regional campus overview, check Paris status
    const effectiveCampus = (p.niveau === 'national') ? 'paris' : cid;
    const s = getPreuveState(effectiveCampus, p.id).statut;
    if (s === 'conforme') done += 1;
    else if (s === 'en_cours') done += 0.5;
  });
  return Math.round((done / preuves.length) * 100);
}

function calcCritereCompletion(critere, campusId) {
  const comps = critere.indicateurs.map(i => calcIndicateurCompletion(i, campusId));
  return Math.round(comps.reduce((a,b) => a+b, 0) / comps.length);
}

function calcGlobalCompletion(campusId) {
  let all = [];
  REFERENTIEL.criteres.forEach(c => c.indicateurs.forEach(i => all.push(calcIndicateurCompletion(i, campusId))));
  return Math.round(all.reduce((a,b) => a+b, 0) / all.length);
}

function getColor(pct) {
  if (pct >= 80) return 'var(--green)';
  if (pct >= 50) return 'var(--orange)';
  return 'var(--red)';
}

function updateLastModified(dt) {
  const el = document.getElementById('last-modified');
  if (dt) { const d = new Date(dt); el.textContent = d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
}

  container.innerHTML = '';
  CAMPUS.forEach(c => {
    const pct = c.id === 'overview' ? '' : calcGlobalCompletion(c.id) + '%';
    const div = document.createElement('div');
    div.className = 'campus-tab' + (c.id === currentCampus ? ' active' : '') + (c.id === 'overview' ? ' overview' : '');
    div.innerHTML = `
      <div><div class="ct-name">${c.icon} ${c.name}</div>
      <div class="ct-meta">${c.jours ? c.jours + 'j audit — ' + c.info : 'Synthèse tous campus'}</div></div>
      ${pct ? '<div class="ct-pct">' + pct + '</div>' : ''}
    `;
    div.onclick = () => { currentCampus = c.id; render(); };
    container.appendChild(div);
  });
}

function renderSidebar() {
  renderCampusTabs();
  const pct = calcGlobalCompletion(currentCampus === 'overview' ? 'paris' : currentCampus);
  document.getElementById('global-pct').textContent = pct + '%';
  document.getElementById('progress-label').textContent = currentCampus === 'overview' ? 'Conformité moyenne' : 'Conformité ' + CAMPUS.find(c=>c.id===currentCampus).name;
  const bar = document.getElementById('global-bar');
  bar.style.width = pct + '%'; bar.style.background = getColor(pct);

  const list = document.getElementById('critere-list');
  list.innerHTML = '';
  REFERENTIEL.criteres.forEach((c, idx) => {
    const cp = calcCritereCompletion(c, currentCampus === 'overview' ? 'paris' : currentCampus);
    const div = document.createElement('div');
    div.className = 'critere-item' + (idx === currentCritere && currentCampus !== 'overview' ? ' active' : '');
    div.innerHTML = `<div class="critere-label">C${c.id}</div><div class="critere-title">${c.titre}</div>
      <div class="critere-progress"><div class="bar"><div class="fill" style="width:${cp}%;background:${getColor(cp)}"></div></div><div class="pct" style="color:${getColor(cp)}">${cp}%</div></div>`;
    div.onclick = () => { if (currentCampus === 'overview') currentCampus = 'paris'; currentCritere = idx; render(); };
    list.appendChild(div);
  });
}

function renderOverview() {
  const main = document.getElementById('main-content');
  let html = `<div class="main-header"><div class="campus-badge overview-badge">📊 Vue globale — 3 campus audités — 4 jours d'audit</div>
    <h2>Synthèse Audit Qualiopi EPITECH</h2><p>Comparaison de la conformité par campus audité</p></div>`;

  // Campus cards
  html += '<div class="overview-grid">';
  CAMPUS.filter(c => c.id !== 'overview').forEach(c => {
    const gp = calcGlobalCompletion(c.id);
    html += `<div class="overview-campus-card"><h3>${c.icon} ${c.name}</h3>
      <div class="oc-meta">${c.jours} jour${c.jours>1?'s':''} d'audit — ${c.info}</div>
      <div class="oc-pct" style="color:${getColor(gp)}">${gp}%</div>
      <div class="progress-bar oc-bar"><div class="fill" style="width:${gp}%;background:${getColor(gp)}"></div></div>
      <div class="overview-criteres">`;
    REFERENTIEL.criteres.forEach(cr => {
      const cp = calcCritereCompletion(cr, c.id);
      html += `<div class="overview-critere-row"><div class="ocr-label">C${cr.id} ${cr.titre}</div>
        <div class="ocr-bar"><div class="fill" style="width:${cp}%;background:${getColor(cp)}"></div></div>
        <div class="ocr-pct" style="color:${getColor(cp)}">${cp}%</div></div>`;
    });
    html += '</div></div>';
  });
  html += '</div>';

  // Matrix table
  html += `<h3 style="margin:20px 0 10px;font-size:16px;">Matrice indicateurs x campus</h3>
    <div style="overflow-x:auto"><table class="matrix-table"><thead><tr><th>Ind.</th><th>Indicateur</th><th>🏛️ Paris (nat+campus)</th><th>🌊 Nantes (campus)</th><th>🏰 Strasbourg (campus)</th></tr></thead><tbody>`;
  REFERENTIEL.criteres.forEach(cr => {
    cr.indicateurs.forEach(ind => {
      const pp = calcIndicateurCompletion(ind, 'paris');
      const np = calcIndicateurCompletion(ind, 'nantes');
      const sp = calcIndicateurCompletion(ind, 'strasbourg');
      const natCount = getNationalPreuvesCount(ind);
      const campCount = ind.preuves.length - natCount;
      html += `<tr><td><strong>${ind.id}</strong></td><td>${ind.titre} <span class="matrix-nat">${natCount}N/${campCount}C</span></td>`;
      [pp,np,sp].forEach(v => {
        html += `<td><div class="cell-bar"><div class="fill" style="width:${v}%;background:${getColor(v)}"></div></div><strong style="color:${getColor(v)}">${v}%</strong></td>`;
      });
      html += '</tr>';
    });
  });
  html += '</tbody></table></div>';
  main.innerHTML = html;
}

function renderCampusView() {
  const main = document.getElementById('main-content');
  const campus = CAMPUS.find(c => c.id === currentCampus);
  const critere = REFERENTIEL.criteres[currentCritere];
  const isRegional = campus.scope === 'campus';

  let totalP = 0, conf = 0, enc = 0, nonEv = 0;
  critere.indicateurs.forEach(ind => {
    getVisiblePreuves(ind, currentCampus).forEach(p => {
      totalP++;
      const eCampus = (p.niveau === 'national') ? 'paris' : currentCampus;
      const s = getPreuveState(eCampus, p.id).statut;
      if (s === 'conforme') conf++; else if (s === 'en_cours') enc++; else nonEv++;
    });
  });

  let html = `<div class="main-header">
    <div class="campus-badge">${campus.icon} ${campus.name} <span class="cb-days">${campus.jours}j</span> <span class="cb-scope">${campus.info}</span></div>
    <h2>Critère ${critere.id} — ${critere.titre}</h2><p>${critere.description}</p></div>`;

  if (isRegional) {
    html += `<div class="not-audited-info"><strong>Campus régional :</strong> seules les preuves de niveau <strong>campus</strong> sont auditées ici. Les preuves <strong>nationales</strong> sont vérifiées à Paris.</div>`;
  }

  html += `<div class="stats-row">
    <div class="stat-card blue"><div class="stat-label">Preuves visibles</div><div class="stat-value">${totalP}</div></div>
    <div class="stat-card green"><div class="stat-label">Conformes</div><div class="stat-value">${conf}</div></div>
    <div class="stat-card orange"><div class="stat-label">En cours</div><div class="stat-value">${enc}</div></div>
    <div class="stat-card red"><div class="stat-label">À évaluer</div><div class="stat-value">${nonEv}</div></div></div>`;

  html += `<div class="filter-tabs">
    <div class="filter-tab ${filterType==='all'?'active':''}" onclick="filterType='all';render()">Tous</div>
    <div class="filter-tab ${filterType==='OF'?'active':''}" onclick="filterType='OF';render()">OF</div>
    <div class="filter-tab ${filterType==='CFA'?'active':''}" onclick="filterType='CFA';render()">CFA</div>
    <div class="filter-tab ${filterType==='VAE'?'active':''}" onclick="filterType='VAE';render()">VAE</div>
    <div class="filter-tab ${filterType==='CBC'?'active':''}" onclick="filterType='CBC';render()">CBC</div></div>`;

  html += '<div id="indicateurs-container"></div>';
  main.innerHTML = html;

  const container = document.getElementById('indicateurs-container');
  let indicateurs = critere.indicateurs;
  if (searchTerm) { const s = searchTerm.toLowerCase(); indicateurs = indicateurs.filter(i => i.titre.toLowerCase().includes(s) || i.description.toLowerCase().includes(s)); }
  if (filterType !== 'all') indicateurs = indicateurs.filter(i => i.applicable.includes(filterType));

  indicateurs.forEach(ind => {
    const visiblePreuves = getVisiblePreuves(ind, currentCampus);
    const indPct = calcIndicateurCompletion(ind, currentCampus);
    const card = document.createElement('div');
    card.className = 'indicateur-card';
    card.id = 'ind-' + ind.id;

    let preuvesHtml = '';
    visiblePreuves.forEach(p => {
      const effectiveCampus = (p.niveau === 'national') ? 'paris' : currentCampus;
      const ps = getPreuveState(effectiveCampus, p.id);
      const checkedClass = ps.statut === 'conforme' ? 'checked' : ps.statut === 'en_cours' ? 'partial' : ps.statut === 'na' ? 'na-item' : '';
      const isNatOnParis = (p.niveau === 'national' && currentCampus === 'paris');
      const niveauBadge = `<span class="niveau-badge ${p.niveau}">${p.niveau === 'national' ? 'NATIONAL' : 'CAMPUS'}</span>`;

      preuvesHtml += `<div class="preuve-item ${checkedClass}">
        <input type="checkbox" ${ps.statut==='conforme'?'checked':''} onchange="togglePreuve('${effectiveCampus}','${p.id}',this.checked)">
        <div class="preuve-info">
          <div class="preuve-label">${p.label} ${niveauBadge}</div>
          <div class="preuve-meta">Priorité: ${'★'.repeat(p.priorite)}${'☆'.repeat(4-p.priorite)}</div>
          <input class="preuve-note" type="text" placeholder="Note ou lien vers la preuve..." value="${(ps.note||'').replace(/"/g,'&quot;')}" onchange="updateNote('${effectiveCampus}','${p.id}',this.value)">
        </div>
        <div class="preuve-actions">
          <select onchange="updateStatut('${effectiveCampus}','${p.id}',this.value)">
            <option value="non_evalue" ${ps.statut==='non_evalue'?'selected':''}>⬜ Non évalué</option>
            <option value="conforme" ${ps.statut==='conforme'?'selected':''}>✅ Conforme</option>
            <option value="en_cours" ${ps.statut==='en_cours'?'selected':''}>🔶 En cours</option>
            <option value="non_conforme" ${ps.statut==='non_conforme'?'selected':''}>❌ Non conforme</option>
            <option value="na" ${ps.statut==='na'?'selected':''}>➖ N/A</option>
          </select>
        </div></div>`;
    });

    let obligHtml = '';
    if (ind.obligations.length) {
      obligHtml = '<div class="obligations-box"><div class="ob-title">Obligations spécifiques</div>';
      ind.obligations.forEach(o => obligHtml += `<div class="ob-item"><span class="ob-label">${o.type} :</span> ${o.texte}</div>`);
      obligHtml += '</div>';
    }

    let actHtml = '';
    if (ind.actions.length) {
      actHtml = '<div class="section-title">Actions à mener</div>';
      ind.actions.forEach(a => actHtml += `<div class="action-item"><span class="action-status ${a.statut}">${a.statut==='termine'?'Terminé':a.statut==='en_cours'?'En cours':'À faire'}</span><div><div>${a.desc}</div><div class="action-resp">→ ${a.resp}</div></div></div>`);
    }

    const tags = ind.applicable.map(t => `<span class="tag ${t.toLowerCase()}">${t}</span>`).join('');

    card.innerHTML = `<div class="indicateur-header" onclick="toggleCard(${ind.id})">
      <div class="num">${ind.id}</div>
      <div class="info"><div class="title">${ind.titre}</div><div class="desc">${ind.description}</div><div class="tags">${tags}</div></div>
      <div class="completion"><div class="pct" style="color:${getColor(indPct)}">${indPct}%</div>
        <div class="mini-bar"><div class="fill" style="width:${indPct}%;background:${getColor(indPct)}"></div></div></div>
      <div class="chevron">›</div></div>
    <div class="indicateur-body"><div class="full-desc">${ind.description}</div>
      <div class="section-title">Éléments de preuve (${visiblePreuves.length}${isRegional ? ' campus' : ''})</div>
      ${preuvesHtml}${obligHtml}${actHtml}</div>`;
    container.appendChild(card);
  });
}

function render() {
  renderSidebar();
  if (currentCampus === 'overview') renderOverview();
  else renderCampusView();
  updateLastModified(state._lastModified);
}

function toggleCard(id) { document.getElementById('ind-'+id).classList.toggle('open'); }
function togglePreuve(campus, pid, checked) { setPreuveState(campus, pid, {statut: checked?'conforme':'non_evalue'}); render(); }
function updateStatut(campus, pid, statut) { setPreuveState(campus, pid, {statut}); render(); }
function updateNote(campus, pid, note) { setPreuveState(campus, pid, {note}); }

document.getElementById('search').addEventListener('input', e => { searchTerm = e.target.value; if (currentCampus === 'overview') currentCampus = 'paris'; render(); });

function exportData() {
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'qualiopi_epitech_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importData() { document.getElementById('import-file').click(); }
function handleImport(e) {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => { try { state = JSON.parse(ev.target.result); saveState(state); render(); alert('Import OK !'); } catch(err) { alert('Erreur: '+err.message); } };
  r.readAsText(f);
}
function resetData() {
  if(confirm('Réinitialiser toutes les données aux valeurs par défaut ?')) {
    localStorage.removeItem(STORAGE_KEY);
    state = buildDefaultState();
    state._lastModified = new Date().toISOString();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    render();
  }
}

render();
</script>
</body>
</html>
